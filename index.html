<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Doto:wght@100..900&display=swap');

    body {
      font-family: 'Doto', sans-serif;
    }
  </style>
</head>

<body class="bg-black text-white flex flex-col items-center justify-center h-screen w-screen overflow-hidden px-6">

  <!-- Quote -->
  <div class="text-center opacity-60 mb-8 tracking-wide"
       style="font-size: min(3.5vh, 2.2vw);">
    Until death, all defeats are psychological.
  </div>

  <!-- Numbers Row -->
  <div class="flex items-center justify-center gap-3"
       style="font-size: min(20vh, 9vw); line-height: 1;">

    <div id="days">00</div>
    <div class="opacity-70">:</div>

    <div id="hours">00</div>
    <div class="opacity-70">:</div>

    <div id="minutes">00</div>
    <div class="opacity-70">:</div>

    <div id="seconds">00</div>
    <div class="opacity-70">:</div>

    <div id="ms">000</div>

  </div>

  <!-- Labels Row -->
  <div class="flex items-center justify-center gap-6 mt-4 text-center"
       style="font-size: min(2.5vh, 1.6vw);">

    <div class="w-[10vw] opacity-50 tracking-widest">DAYS</div>
    <div class="w-[10vw] opacity-50 tracking-widest">HOURS</div>
    <div class="w-[10vw] opacity-50 tracking-widest">MIN</div>
    <div class="w-[10vw] opacity-50 tracking-widest">SEC</div>
    <div class="w-[10vw] opacity-50 tracking-widest">MS</div>

  </div>

  <script>
    const targetDate = new Date('2026-10-09T00:00:00');

    function updateCountdown() {
      const now = new Date();
      let diff = targetDate - now;

      if (diff <= 0) diff = 0;

      let days = Math.floor(diff / (1000 * 60 * 60 * 24));
      diff %= (1000 * 60 * 60 * 24);

      let hours = Math.floor(diff / (1000 * 60 * 60));
      diff %= (1000 * 60 * 60);

      let minutes = Math.floor(diff / (1000 * 60));
      diff %= (1000 * 60);

      let seconds = Math.floor(diff / 1000);
      let ms = diff % 1000;

      document.getElementById('days').textContent = days.toString().padStart(2, '0');
      document.getElementById('hours').textContent = hours.toString().padStart(2, '0');
      document.getElementById('minutes').textContent = minutes.toString().padStart(2, '0');
      document.getElementById('seconds').textContent = seconds.toString().padStart(2, '0');
      document.getElementById('ms').textContent = ms.toString().padStart(3, '0');
    }

    setInterval(updateCountdown, 16);
    updateCountdown();
  </script>

</body>
</html>
